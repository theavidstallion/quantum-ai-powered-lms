version: '3.8'

services:
  quantum-lms:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quantum-lms-app
    restart: unless-stopped
    
    ports:
      - "5000:5000"
    
    environment:
      # Load from .env file in parent directory
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    
    env_file:
      - ../.env
    
    volumes:
      # Persist database
      - ../quantum_lms.db:/app/quantum_lms.db
      # Persist video outputs
      - ../output:/app/output
      # Persist media files
      - ../media:/app/media
      # Optional: mount code for development (comment out for production)
      # - ..:/app
    
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    
    networks:
      - quantum-lms-network

networks:
  quantum-lms-network:
    driver: bridge
