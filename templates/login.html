<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 QUANTUM LMS - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #050510;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 229, 255, 0.15) 0%, transparent 50%);
            animation: bgShift 20s ease infinite;
        }

        @keyframes bgShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .login-container {
            background: #0d0d2b;
            border: 1px solid #1e2a4a;
            border-radius: 16px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #00e5ff;
            margin-bottom: 5px;
        }

        .logo p {
            color: #94a3b8;
            font-size: 13px;
        }

        .cam-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid #1e2a4a;
            transition: all 0.3s;
        }

        .cam-wrapper.verified {
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            animation: pulse 2s infinite;
        }

        .cam-wrapper.locked {
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
            50% { box-shadow: 0 0 30px rgba(0, 229, 255, 0.6); }
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cam-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 229, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #00e5ff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #111135;
            border: 1px solid #1e2a4a;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        #loginBtn {
            width: 100%;
            padding: 14px;
            background: #00e5ff;
            color: #050510;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        #loginBtn:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
            transform: translateY(-2px);
        }

        #loginBtn:disabled {
            background: #1e2a4a;
            cursor: not-allowed;
        }

        #statusMsg {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            min-height: 20px;
        }

        .quantum-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.95);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0d0d2b;
            border: 2px solid #7c3aed;
            border-radius: 16px;
            padding: 40px;
            width: 500px;
            text-align: center;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.4);
        }

        .modal-content h2 {
            color: #7c3aed;
            margin-bottom: 20px;
        }

        .quantum-key-box {
            background: #111135;
            border: 1px solid #7c3aed;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #7c3aed;
            word-break: break-all;
            letter-spacing: 2px;
        }

        #verifyBtn {
            width: 100%;
            padding: 14px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        #verifyBtn:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
            transform: translateY(-2px);
        }

        #verifyBtn:disabled {
            background: #1e2a4a;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔐 QUANTUM LMS</h1>
            <p>Secure Authentication System</p>
        </div>

        <div class="cam-wrapper" id="camBox">
            <video id="video" autoplay muted playsinline></video>
            <div class="cam-label">Face Verification Active</div>
        </div>

        <div class="form-group">
            <input type="text" id="username" placeholder="Username" autocomplete="username">
        </div>

        <div class="form-group">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        </div>

        <button id="loginBtn">LOGIN</button>

        <div id="statusMsg"></div>
    </div>

    <!-- Quantum Verification Modal -->
    <div class="quantum-modal" id="quantumModal">
        <div class="modal-content">
            <h2>🔑 Quantum Key Verification</h2>
            <p style="color: #94a3b8; margin-bottom: 15px;">Your quantum-encrypted session key:</p>
            <div class="quantum-key-box" id="quantumKeyDisplay"></div>
            <p style="color: #94a3b8; margin-bottom: 10px; font-size: 13px;">Enter the key to verify your identity</p>
            <input type="text" id="keyInput" placeholder="Paste or type the key here">
            <button id="verifyBtn">VERIFY</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
<canvas id="canvas" style="display:none;"></canvas>
</div>

<div id="status" style="color: #dc3545; font-weight: bold; font-size: 0.9rem;">⚠️ Face Verification Required</div>

<div id="quantumBar"><div id="quantumFill"></div></div>
<small id="keyText" style="display:none; color: var(--primary);">Generating Quantum Key...</small>

<input type="text" id="user" placeholder="NetID / Username" disabled>
<input type="password" id="pass" placeholder="Password" disabled>
<button id="btn" disabled>SECURE LOGIN</button>
</div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const camBox = document.getElementById('camBox');
let isSecure = false;

window.onload = function() {
    document.getElementById('micBtn').focus();
    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome. Press Spacebar to speak."));
};

document.body.onkeyup = e => { if(e.keyCode == 32) startListening(); }

navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
    video.srcObject = s;
    setInterval(detectFace, 1000);
});

function detectFace() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    fetch('/detect_face', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({image: canvas.toDataURL('image/jpeg')})
    }).then(res=>res.json()).then(data => {
        if(data.face_detected) {
            if(!isSecure) {
                isSecure = true;
                camBox.classList.add('verified');
                status.innerText = "✅ Biometric Verified";
                status.style.color = "#28a745";
                triggerQuantum();
            }
        } else {
            if(isSecure) {
                isSecure = false;
                camBox.classList.remove('verified');
                camBox.classList.add('locked');
                status.innerText = "⚠️ Face Lost! System Locked.";
                toggleInputs(true);
            }
        }
    });
}

function triggerQuantum() {
    if(!isSecure) return;
    document.getElementById('quantumBar').style.display = 'block';

    fetch('/get_quantum_key').then(res=>res.json()).then(data => {
        setTimeout(() => document.getElementById('quantumFill').style.width = "100%", 100);

        setTimeout(() => {
            if(isSecure) {
                document.getElementById('keyText').style.display = 'block';
                document.getElementById('keyText').innerText =
                    `Quantum Encrypted: ${data.key.substring(0,10)}...`;
                toggleInputs(false);
                speak("Face Verified.");
            }
        }, 1000);
    });
}

function toggleInputs(disabled) {
    document.getElementById('user').disabled = disabled;
    document.getElementById('pass').disabled = disabled;
    document.getElementById('btn').disabled = disabled;
}

document.getElementById('btn').onclick = function() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: u,
            password: p,
            image: canvas.toDataURL('image/jpeg')
        })
    })
    .then(res=>res.json())
    .then(data => {

        if(data.success) {

            // ✅ QUANTUM VERIFICATION STEP
            const quantum_key = data.quantum_key;

            fetch('/quantum_verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({key: quantum_key})
            })
            .then(res=>res.json())
            .then(qdata => {
                if(qdata.success) {
                    speak("Access Granted.");
                    setTimeout(() => window.location.href="/dashboard", 1500);
                } else {
                    alert("Quantum verification failed!");
                }
            });

        } else {
            alert(data.message);
            speak("Login failed.");
        }

    });
};

function startListening() {
    if (!('webkitSpeechRecognition' in window)) return;
    const rec = new webkitSpeechRecognition();
    rec.lang = 'en-US';
    rec.start();

    document.getElementById('micBtn').classList.add('mic-active');

    rec.onresult = function(e) {
        let txt = e.results[0][0].transcript.replace(/[.,\s]/g, '');

        if (e.results[0][0].transcript.toLowerCase().includes("login")) {
            document.getElementById('btn').click();
        } else if (!document.getElementById('user').value) {
            document.getElementById('user').value = txt;
        } else {
            document.getElementById('pass').value = txt;
        }

        document.getElementById('micBtn').classList.remove('mic-active');
    };
}

function speak(t) {
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}
</script>

</body>
</html>
